  <script>
    (function () {
      // Theme toggle
      var toggle = document.querySelector('[data-theme-toggle]');
      function updateToggleLabel(theme) {
        if (!toggle) return;
        toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      }
      updateToggleLabel(document.documentElement.getAttribute('data-theme') || 'dark');
      if (toggle) {
        toggle.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('preed-ee-theme', next); } catch (e) {}
          updateToggleLabel(next);
        });
      }

      var groupsHost = document.querySelector('[data-groups]');
      var navHost = document.querySelector('[data-nav-links]');
      var fallback = document.querySelector('[data-fallback]');
      var scannedEl = document.querySelector('[data-scanned-at]');
      var countEl = document.querySelector('[data-count]');
      var main = document.getElementById('projects');

      function showFallback() {
        if (fallback) fallback.hidden = false;
        if (groupsHost) groupsHost.hidden = true;
        main.setAttribute('aria-busy', 'false');
      }
      function fmtDate(s) { return s ? String(s).slice(0, 10) : '—'; }
      function fmtScanned(s) {
        if (!s) return '—';
        var str = String(s);
        return str.length >= 16 ? str.slice(0, 10) + ' ' + str.slice(11, 16) : str;
      }
      function el(tag, cls, text) {
        var n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text != null) n.textContent = text;
        return n;
      }
      function dateCell(cls, labelText, dateStr) {
        var cell = el('span', cls);
        cell.appendChild(el('span', 'date-label', labelText + ' '));
        cell.appendChild(el('span', 'date-value', fmtDate(dateStr)));
        return cell;
      }
      function slug(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

      var START = '<!-- DATA:START -->';
      var END = '<!-- DATA:END -->';
      var node = document.getElementById('project-data');
      if (!node || !node.textContent) { showFallback(); return; }
      var raw = node.textContent;
      var s = raw.indexOf(START);
      var e = raw.indexOf(END);
      var payload = s !== -1 && e !== -1 ? raw.slice(s + START.length, e) : raw;

      var data;
      try { data = JSON.parse(payload); } catch (err) { showFallback(); return; }
      if (!data || !Array.isArray(data.groups) || data.groups.length === 0) {
        if (scannedEl && data) scannedEl.textContent = fmtScanned(data.scannedAt);
        showFallback();
        return;
      }

      scannedEl.textContent = fmtScanned(data.scannedAt);
      countEl.textContent = String(data.count != null ? data.count : 0);

      var frag = document.createDocumentFragment();
      var navFrag = document.createDocumentFragment();
      data.groups.forEach(function (g) {
        var groupId = 'group-' + slug(g.name);

        if (navHost) {
          var navLink = document.createElement('a');
          navLink.href = '#' + groupId;
          navLink.textContent = g.navLabel || g.name;
          navFrag.appendChild(navLink);
        }
        var section = document.createElement('details');
        section.className = 'group';
        section.id = groupId;
        var savedState = null;
        try { savedState = sessionStorage.getItem('preed-ee-group-' + groupId); } catch (err) {}
        // Default open; only closed if explicitly saved as "closed"
        if (savedState === 'closed') {
          section.open = false;
        } else {
          section.open = true;
        }

        var summary = document.createElement('summary');
        var name = el('span', 'group-name', g.name);
        var count = el('span', 'group-count', String((g.projects || []).length));
        var chevronSvg = '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>';
        summary.appendChild(name);
        summary.appendChild(count);
        var chevronWrap = document.createElement('span');
        chevronWrap.innerHTML = chevronSvg;
        summary.appendChild(chevronWrap.firstChild);
        section.appendChild(summary);

        section.addEventListener('toggle', function () {
          try {
            sessionStorage.setItem('preed-ee-group-' + groupId, section.open ? 'open' : 'closed');
          } catch (err) {}
        });

        var list = el('ol', 'project-list');
        (g.projects || []).forEach(function (p) {
          var li = el('li', 'project-row');

          var img = document.createElement('img');
          img.className = 'project-logo';
          img.alt = '';
          img.setAttribute('aria-hidden', 'true');
          img.loading = 'lazy';
          img.width = 40; img.height = 40;
          img.src = p.logoPath || '';
          li.appendChild(img);

          var headEl = el('div', 'project-head');
          headEl.appendChild(el('span', 'project-name', p.name || 'untitled'));
          if (p.status) {
            var badge = el('span', 'project-status status-' + p.status, p.status);
            badge.setAttribute('aria-label', 'status: ' + p.status);
            headEl.appendChild(badge);
          }
          if (p.stack) headEl.appendChild(el('span', 'project-stack', p.stack));

          var bodyEl = el('div', 'project-body');
          bodyEl.appendChild(headEl);
          if (p.purpose) bodyEl.appendChild(el('p', 'project-purpose', p.purpose));

          if (Array.isArray(p.pendingActions) && p.pendingActions.length > 0) {
            var pending = el('div', 'project-pending');
            pending.appendChild(el('span', 'pending-label', 'Pending'));
            var ulPending = el('ul', 'pending-list');
            p.pendingActions.forEach(function (action) {
              ulPending.appendChild(el('li', 'pending-item', action));
            });
            pending.appendChild(ulPending);
            bodyEl.appendChild(pending);
          }

          li.appendChild(bodyEl);
          li.appendChild(dateCell('project-created', 'created', p.createdAt));
          li.appendChild(dateCell('project-updated', 'updated', p.updatedAt));
          list.appendChild(li);
        });
        section.appendChild(list);
        frag.appendChild(section);
      });
      groupsHost.appendChild(frag);
      if (navHost) navHost.appendChild(navFrag);
      main.setAttribute('aria-busy', 'false');
    })();
  </script>
