<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <meta name="robots" content="noindex, nofollow">
  <title>preed.ee / projects</title>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('preed-ee-theme');
        var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600&display=swap">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="dashboard">
  <a class="skip" href="#projects">skip to projects</a>

  <header class="page-head">
    <div class="brand">
      <h1><span class="brand-mark">preedee</span> <span class="brand-sep">/</span> <span class="brand-section">projects</span></h1>
      <p class="tagline">projects, shipped and in progress</p>
    </div>
    <div class="nav-controls">
      <nav class="nav-links" aria-label="group navigation" data-nav-links></nav>
      <button type="button" class="theme-toggle" aria-label="Switch theme" data-theme-toggle>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <div class="page-meta">
        <span><span class="meta-label">last scanned</span> <span class="meta-value" data-scanned-at>&mdash;</span></span>
        <span><span class="meta-label">total</span> <span class="meta-value"><span data-count>0</span> projects</span></span>
      </div>
    </div>
  </header>

  <main id="projects" class="projects" aria-busy="true">
    <div data-groups></div>
    <p class="fallback" data-fallback hidden>dashboard data unavailable &mdash; check back soon</p>
  </main>

  <footer class="page-foot">
    <span>generated by a bun script running on my laptop</span>
  </footer>

  <script id="project-data" type="application/json">
<!-- DATA:START -->
{"scannedAt":"","count":0,"groups":[]}
<!-- DATA:END -->
  </script>

  <script>
    (function () {
      // Theme toggle
      var toggle = document.querySelector('[data-theme-toggle]');
      function updateToggleLabel(theme) {
        if (!toggle) return;
        toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      }
      updateToggleLabel(document.documentElement.getAttribute('data-theme') || 'dark');
      if (toggle) {
        toggle.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'dark';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('preed-ee-theme', next); } catch (e) {}
          updateToggleLabel(next);
        });
      }

      var groupsHost = document.querySelector('[data-groups]');
      var navHost = document.querySelector('[data-nav-links]');
      var fallback = document.querySelector('[data-fallback]');
      var scannedEl = document.querySelector('[data-scanned-at]');
      var countEl = document.querySelector('[data-count]');
      var main = document.getElementById('projects');

      function showFallback() {
        if (fallback) fallback.hidden = false;
        if (groupsHost) groupsHost.hidden = true;
        main.setAttribute('aria-busy', 'false');
      }
      function fmtDate(s) { return s ? String(s).slice(0, 10) : '—'; }
      function fmtScanned(s) {
        if (!s) return '—';
        var str = String(s);
        return str.length >= 16 ? str.slice(0, 10) + ' ' + str.slice(11, 16) : str;
      }
      function el(tag, cls, text) {
        var n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text != null) n.textContent = text;
        return n;
      }
      function dateCell(cls, labelText, dateStr) {
        var cell = el('span', cls);
        cell.appendChild(el('span', 'date-label', labelText + ' '));
        cell.appendChild(el('span', 'date-value', fmtDate(dateStr)));
        return cell;
      }
      function slug(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

      var START = '<!-- DATA:START -->';
      var END = '<!-- DATA:END -->';
      var node = document.getElementById('project-data');
      if (!node || !node.textContent) { showFallback(); return; }
      var raw = node.textContent;
      var s = raw.indexOf(START);
      var e = raw.indexOf(END);
      var payload = s !== -1 && e !== -1 ? raw.slice(s + START.length, e) : raw;

      var data;
      try { data = JSON.parse(payload); } catch (err) { showFallback(); return; }
      if (!data || !Array.isArray(data.groups) || data.groups.length === 0) {
        if (scannedEl && data) scannedEl.textContent = fmtScanned(data.scannedAt);
        showFallback();
        return;
      }

      scannedEl.textContent = fmtScanned(data.scannedAt);
      countEl.textContent = String(data.count != null ? data.count : 0);

      var frag = document.createDocumentFragment();
      var navFrag = document.createDocumentFragment();
      data.groups.forEach(function (g) {
        var groupId = 'group-' + slug(g.name);

        if (navHost) {
          var navLink = document.createElement('a');
          navLink.href = '#' + groupId;
          navLink.textContent = g.navLabel || g.name;
          navFrag.appendChild(navLink);
        }
        var section = document.createElement('details');
        section.className = 'group';
        section.id = groupId;
        var savedState = null;
        try { savedState = sessionStorage.getItem('preed-ee-group-' + groupId); } catch (err) {}
        // Default open; only closed if explicitly saved as "closed"
        if (savedState === 'closed') {
          section.open = false;
        } else {
          section.open = true;
        }

        var summary = document.createElement('summary');
        var name = el('span', 'group-name', g.name);
        var count = el('span', 'group-count', String((g.projects || []).length));
        var chevronSvg = '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>';
        summary.appendChild(name);
        summary.appendChild(count);
        var chevronWrap = document.createElement('span');
        chevronWrap.innerHTML = chevronSvg;
        summary.appendChild(chevronWrap.firstChild);
        section.appendChild(summary);

        section.addEventListener('toggle', function () {
          try {
            sessionStorage.setItem('preed-ee-group-' + groupId, section.open ? 'open' : 'closed');
          } catch (err) {}
        });

        var list = el('ol', 'project-list');
        (g.projects || []).forEach(function (p) {
          var li = el('li', 'project-row');

          var img = document.createElement('img');
          img.className = 'project-logo';
          img.alt = '';
          img.setAttribute('aria-hidden', 'true');
          img.loading = 'lazy';
          img.width = 40; img.height = 40;
          img.src = p.logoPath || '';
          li.appendChild(img);

          var headEl = el('div', 'project-head');
          if (p.website) {
            var link = document.createElement('a');
            link.className = 'project-name project-name-link';
            link.href = p.website;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = p.name || 'untitled';
            var arrow = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            arrow.setAttribute('class', 'project-name-arrow');
            arrow.setAttribute('viewBox', '0 0 24 24');
            arrow.setAttribute('fill', 'none');
            arrow.setAttribute('stroke', 'currentColor');
            arrow.setAttribute('stroke-width', '2');
            arrow.setAttribute('stroke-linecap', 'round');
            arrow.setAttribute('stroke-linejoin', 'round');
            arrow.setAttribute('aria-hidden', 'true');
            arrow.innerHTML = '<path d="M7 17L17 7"/><path d="M8 7h9v9"/>';
            link.appendChild(arrow);
            headEl.appendChild(link);
          } else {
            headEl.appendChild(el('span', 'project-name', p.name || 'untitled'));
          }
          if (p.status) {
            var badge = el('span', 'project-status status-' + p.status, p.status);
            badge.setAttribute('aria-label', 'status: ' + p.status);
            headEl.appendChild(badge);
          }

          var bodyEl = el('div', 'project-body');
          bodyEl.appendChild(headEl);
          if (p.stack) bodyEl.appendChild(el('span', 'project-stack', p.stack));
          if (p.purpose) bodyEl.appendChild(el('p', 'project-purpose', p.purpose));

          if (Array.isArray(p.pendingActions) && p.pendingActions.length > 0) {
            var pendingCount = p.pendingActions.length;
            var chip = el('span', 'pending-chip', 'Pending · ' + pendingCount);
            chip.setAttribute('aria-label', pendingCount + ' pending action' + (pendingCount === 1 ? '' : 's'));
            headEl.appendChild(chip);

            var pending = el('div', 'project-pending');
            var ulPending = el('ul', 'pending-list');
            p.pendingActions.forEach(function (action) {
              ulPending.appendChild(el('li', 'pending-item', action));
            });
            pending.appendChild(ulPending);
            bodyEl.appendChild(pending);
          }

          if (Array.isArray(p.commands) && p.commands.length > 0) {
            var commandsCount = p.commands.length;
            var commandsChip = el('span', 'commands-chip', 'Commands · ' + commandsCount);
            commandsChip.setAttribute('aria-label', commandsCount + ' command' + (commandsCount === 1 ? '' : 's'));
            headEl.appendChild(commandsChip);

            var commands = el('div', 'project-commands');
            var ulCommands = el('ul', 'commands-list');
            p.commands.forEach(function (cmd) {
              ulCommands.appendChild(el('li', 'command-item', 'bun run ' + cmd));
            });
            commands.appendChild(ulCommands);
            bodyEl.appendChild(commands);
          }

          li.appendChild(bodyEl);
          li.appendChild(dateCell('project-created', 'created', p.createdAt));
          li.appendChild(dateCell('project-updated', 'updated', p.updatedAt));
          list.appendChild(li);
        });
        section.appendChild(list);
        frag.appendChild(section);
      });
      groupsHost.appendChild(frag);
      if (navHost) navHost.appendChild(navFrag);
      main.setAttribute('aria-busy', 'false');
    })();
  </script>
</body>
</html>
