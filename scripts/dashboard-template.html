<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex, nofollow">
  <title>preed.ee / projects</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <a class="skip" href="#projects">skip to projects</a>

  <header class="page-head">
    <div class="brand">
      <h1><span class="brand-mark">preedee</span> <span class="brand-sep">/</span> <span class="brand-section">projects</span></h1>
      <p class="tagline">projects, shipped and in progress</p>
    </div>
    <div class="meta">
      <span><span class="meta-label">last scanned</span> <span class="meta-value" data-scanned-at>&mdash;</span></span>
      <span><span class="meta-label">total</span> <span class="meta-value"><span data-count>0</span> projects</span></span>
    </div>
  </header>

  <main id="projects" class="projects" aria-busy="true">
    <div data-groups></div>
    <p class="fallback" data-fallback hidden>dashboard data unavailable &mdash; check back soon</p>
  </main>

  <footer class="page-foot">
    <span>generated by a bun script running on my laptop</span>
  </footer>

  <script id="project-data" type="application/json">
<!-- DATA:START -->
{"scannedAt":"","count":0,"groups":[]}
<!-- DATA:END -->
  </script>

  <script>
    (function () {
      var groupsHost = document.querySelector('[data-groups]');
      var fallback = document.querySelector('[data-fallback]');
      var scannedEl = document.querySelector('[data-scanned-at]');
      var countEl = document.querySelector('[data-count]');
      var main = document.getElementById('projects');

      function showFallback() {
        if (fallback) fallback.hidden = false;
        if (groupsHost) groupsHost.hidden = true;
        main.setAttribute('aria-busy', 'false');
      }
      function fmtDate(s) { return s ? String(s).slice(0, 10) : '\u2014'; }
      function fmtScanned(s) {
        if (!s) return '\u2014';
        var str = String(s);
        return str.length >= 16 ? str.slice(0, 10) + ' ' + str.slice(11, 16) : str;
      }
      function el(tag, cls, text) {
        var n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text != null) n.textContent = text;
        return n;
      }
      function dateCell(cls, labelText, dateStr) {
        var cell = el('span', cls);
        cell.appendChild(el('span', 'date-label', labelText + ' '));
        cell.appendChild(el('span', 'date-value', fmtDate(dateStr)));
        return cell;
      }

      var START = '<!-- DATA:START -->';
      var END = '<!-- DATA:END -->';
      var node = document.getElementById('project-data');
      if (!node || !node.textContent) { showFallback(); return; }
      var raw = node.textContent;
      var s = raw.indexOf(START);
      var e = raw.indexOf(END);
      var payload = s !== -1 && e !== -1 ? raw.slice(s + START.length, e) : raw;

      var data;
      try { data = JSON.parse(payload); } catch (err) { showFallback(); return; }
      if (!data || !Array.isArray(data.groups) || data.groups.length === 0) {
        if (scannedEl && data) scannedEl.textContent = fmtScanned(data.scannedAt);
        showFallback();
        return;
      }

      scannedEl.textContent = fmtScanned(data.scannedAt);
      countEl.textContent = String(data.count != null ? data.count : 0);

      var frag = document.createDocumentFragment();
      data.groups.forEach(function (g) {
        var section = el('section', 'group');
        var head = el('h2', 'group-name', g.name);
        section.appendChild(head);
        var list = el('ol', 'project-list');
        (g.projects || []).forEach(function (p) {
          var li = el('li', 'project-row');

          var img = document.createElement('img');
          img.className = 'project-logo';
          img.alt = '';
          img.setAttribute('aria-hidden', 'true');
          img.loading = 'lazy';
          img.width = 40; img.height = 40;
          img.src = p.logoPath || '';
          li.appendChild(img);

          var headEl = el('div', 'project-head');
          headEl.appendChild(el('span', 'project-name', p.name || 'untitled'));
          if (p.stack) headEl.appendChild(el('span', 'project-stack', p.stack));

          var bodyEl = el('div', 'project-body');
          bodyEl.appendChild(headEl);
          if (p.purpose) bodyEl.appendChild(el('p', 'project-purpose', p.purpose));

          li.appendChild(bodyEl);
          li.appendChild(dateCell('project-created', 'created', p.createdAt));
          li.appendChild(dateCell('project-updated', 'updated', p.updatedAt));
          list.appendChild(li);
        });
        section.appendChild(list);
        frag.appendChild(section);
      });
      groupsHost.appendChild(frag);
      main.setAttribute('aria-busy', 'false');
    })();
  </script>
</body>
</html>
